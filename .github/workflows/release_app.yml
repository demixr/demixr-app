name: Build and release app
on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v*.*.*'

# Pin to the toolchain the project is developed against.
env:
  FLUTTER_VERSION: "3.44.2"

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      # arm64 only: the ExecuTorch (executorch_flutter) Android prebuilt ships
      # arm64-v8a only, so --split-per-abi / 32-bit builds would fail. Release
      # is debug-signed (see android/app/build.gradle) — installable, not
      # Play-Store-ready until a release keystore is configured.
      - run: flutter build apk --release --target-platform android-arm64
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/*.apk"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

  macos:
    name: Build macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      # Unsigned / not notarized — runnable locally (right-click → Open). For
      # distribution, add Developer ID signing + notarization secrets.
      - name: Package .app
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y demixr-macos.zip ./*.app
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "build/macos/Build/Products/Release/demixr-macos.zip"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

  ios:
    name: Build iOS app (unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      # No Apple signing secrets configured, so this is a build-verification /
      # re-signable artifact, NOT an installable IPA. To ship a signed .ipa, add
      # the signing cert + provisioning profile as secrets and switch to
      # `flutter build ipa --export-options-plist=...`.
      - run: flutter build ios --release --no-codesign
      - name: Package unsigned .app
        run: |
          cd build/ios/iphoneos
          zip -r -y demixr-ios-unsigned.zip Runner.app
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "build/ios/iphoneos/demixr-ios-unsigned.zip"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
